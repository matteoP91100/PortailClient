<!doctype html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Portail Client Prorel</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

    <div class="box">

        <div class="box-header">
            <div class="icon">🏢</div>
            <h1>Portail Client Prorel</h1>
            <p class="subtitle">
                Suivez vos demandes d'intervention en temps réel
            </p>
        </div>

        <div id="error-msg" class="error-msg"></div>

        <div class="field">
            <label for="email">Adresse e-mail</label>
            <input
                type="email"
                id="email"
                placeholder="nom@entreprise.fr">
        </div>

        <div class="field">
            <label for="password">Mot de passe</label>

            <div class="field-password">
                <input
                    type="password"
                    id="password"
                    placeholder="••••••••">

                <button
                    type="button"
                    class="toggle-pwd"
                    onclick="togglePassword()">
                    👁
                </button>
            </div>
        </div>

        <button
            class="btn-login"
            onclick="login()">
            Se connecter
        </button>

    </div>

    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>

</body>

</html>

<!doctype html>

<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Nouvelle demande</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>


<div class="box">

    <div class="box-header">
        <div class="icon">📩</div>
        <h1>Nouvelle demande</h1>
        <p class="subtitle">
            Décrivez votre besoin
        </p>
    </div>

    <div class="field">
        <label>Objet</label>
        <input
            type="text"
            id="objet"
            placeholder="Ex : Caméra hors service">
    </div>

    <div class="field">
        <label>Description</label>
        <textarea
            id="description"
            rows="6"
            placeholder="Décrivez votre problème">
        </textarea>
    </div>

    <div class="field">
    <label>Pièces jointes</label>
    <input
        type="file"
        id="pieces-jointes"
        multiple
        accept=".pdf,.png,.jpg,.jpeg,.doc,.docx">
    <small>Formats acceptés : PDF, images, Word</small>
</div>

    <button
        class="btn-login"
        onclick="createDemande()">
        Envoyer la demande
    </button>

    <button
        class="btn-secondary"
        onclick="location.href='dashboard.html'">
        Retour
    </button>

</div>

<script src="../js/api.js"></script>
<script src="../js/demandes.js"></script>


</body>

</html>
